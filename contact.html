<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Rumaysa Khan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-beige: #ece1d5;
            --maroon-glass: rgba(86, 28, 36, 0.85); /* Translucent Maroon */
            --text-color: #561c24; /* Maroon text for contrast on beige */
            --text-light: #ece1d5;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-beige) !important;
            color: var(--text-color) !important;
            font-weight: 700;
        }

        h1, .navbar-brand, .btn-send { font-family: 'Oswald', sans-serif; }

        .navbar { background-color: transparent !important; border: none !important; }
        .navbar-brand, .nav-link { color: var(--text-color) !important; font-weight: 900; letter-spacing: 1px; }

        .contact-container { padding-top: 160px; padding-bottom: 80px; }
        .contact-title { color: var(--text-color); text-transform: uppercase; font-weight: 900; }

        /* Maroon Translucent Boxes */
        .maroon-glass-box {
            background: var(--maroon-glass) !important;
            backdrop-filter: blur(10px);
            border: none !important;
            border-radius: 20px !important;
            padding: 2rem;
            color: var(--text-light);
        }

        .info-item { display: flex; align-items: center; margin-bottom: 1.5rem; font-weight: 900; color: var(--text-light); }
        .info-item i { color: #C7B7A3; margin-right: 1.2rem; width: 24px; }

        /* Input fields styled to stand out on the maroon background */
        .form-control {
            background: rgba(255, 255, 255, 0.1) !important;
            border: none !important;
            border-radius: 15px !important;
            padding: 1.2rem 1.5rem;
            color: var(--text-light) !important;
            font-weight: 700;
        }
        .form-control::placeholder { color: rgba(253, 251, 249, 0.6); }
        .form-control:focus { background: rgba(255, 255, 255, 0.2) !important; box-shadow: none !important; }

        .btn-send {
            background-color: var(--text-light);
            color: var(--text-color);
            border-radius: 15px !important;
            padding: 1rem 2rem;
            text-transform: uppercase;
            font-weight: 900;
            border: none;
        }
        .btn-send:hover { opacity: 0.9; }

        .social-links a { color: var(--text-color); font-size: 1.8rem; margin-right: 1.5rem; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg fixed-top py-3">
        <div class="container">
            <a class="navbar-brand fw-black" href="index.html">RK.</a>
            <div class="navbar-nav ms-auto flex-row">
                <a class="nav-link px-3" href="index.html">HOME</a>
                <a class="nav-link px-3" href="index.html#projects">WORK</a>
            </div>
        </div>
    </nav>

    <div class="container contact-container">
        <div class="row">
            <div class="col-lg-5 mb-5">
                <h1 class="contact-title display-4">GET IN TOUCH</h1>
                <p>Have a project concept or collaboration in mind? I'd love to hear from you.</p>
                
                <div class="maroon-glass-box mt-4">
                    <div class="info-item"><i class="fa-solid fa-envelope"></i> 26rumaysakhan@gmail.com</div>
                    <div class="info-item"><i class="fa-solid fa-phone"></i> +91 8660129471</div>
                </div>

                <div class="social-links mt-4">
                    <a href="https://www.linkedin.com/in/rumaysa-khan-4a25232ab" target="_blank"><i class="fa-brands fa-linkedin-in"></i></a>
                    <a href="https://github.com/RUMI1969" target="_blank"><i class="fa-brands fa-github"></i></a>
                </div>
            </div>

            <div class="col-lg-7">
                <div class="maroon-glass-box">
                    <form action="https://formspree.io/f/mlgyewwv" method="POST">
                        <div class="row">
                            <div class="col-md-6"><input type="text" name="name" class="form-control mb-3" placeholder="YOUR NAME" required></div>
                            <div class="col-md-6"><input type="email" name="email" class="form-control mb-3" placeholder="YOUR EMAIL" required></div>
                        </div>
                        <input type="text" name="subject" class="form-control mb-3" placeholder="SUBJECT" required>
                        <textarea name="message" class="form-control mb-3" rows="6" placeholder="YOUR MESSAGE" required></textarea>
                        <button type="submit" class="btn btn-send w-100">SEND MESSAGE</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
